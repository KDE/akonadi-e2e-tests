listen = *
protocols = imap

disable_plaintext_auth = no
auth_mechanisms = plain login

mail_location = maildir:/mail/%u

passdb {
  driver = static
  args = password=admin
}

userdb {
  driver = static
  args = uid=1000 gid=1000 home=/mail/%u
}

service imap-login {
  inet_listener imap {
    port = 143
  }
}

log_path = /dev/stdout